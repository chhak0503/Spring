<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="/layout/defaultLayout.html">

    <div class="container-fluid px-4" layout:fragment="content">



        <h3 class="mt-4 mb-4">게시판 글보기</h3>

        <!-- 내용 시작 -->
        <div class="card mb-4">
            <div class="card-header">
                <i class="fas fa-table me-1"></i>
                OOO 글보기
            </div>
            <div class="card-body">

                <form>
                    <div class="mb-3">
                        <label for="exampleFormControlInput1" class="form-label">글제목</label>
                        <input type="email" class="form-control" id="exampleFormControlInput1" name="title" placeholder="글 제목 입력">
                    </div>
                    <div class="mb-3">
                        <label for="exampleFormControlInput1" class="form-label">첨부파일</label>
                        <div>
                            <a href="#">2024 매출자료.xls</a>
                            <span>3회 다운로드</span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="exampleFormControlTextarea1" class="form-label">글내용</label>
                        <textarea class="form-control" id="exampleFormControlTextarea1" rows="10" name="content" placeholder="글 내용 입력"></textarea>
                    </div>

                </form>

            </div>

        </div>

        <div class="text-end">
            <a th:href="@{/article/list}" class="btn btn-primary" id="btnSubmit">목록</a>
        </div>
        <!-- 내용 끝 -->
    </div>
</html>
