<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/defaultLayout}">

    <div class="container-fluid px-4" layout:fragment="content">
        <h3 class="mt-4 mb-4">게시판 목록</h3>

        <!-- 내용 시작 -->
        <div class="card mb-4">
            <div class="card-header">
                <i class="fas fa-table me-1"></i>
                OOO 글목록
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>번호</th>
                            <th>제목</th>
                            <th>작성자</th>
                            <th>조회수</th>
                            <th>등록일</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="article, index:${pageResponseDTO.dtoList}">
                            <td>[[${pageResponseDTO.startNo - index.index}]]</td>
                            <td>
                                <a href="@{#}">[[${article.title}]]</a>
                            </td>
                            <td>[[${article.user.nick}]]</td>
                            <td>[[${article.hit}]]</td>
                            <td>[[${article.rdate}]]</td>
                        </tr>
                    </tbody>
                </table>

                <nav aria-label="Page navigation example">
                    <ul class="pagination justify-content-center">

                        <li th:if="${pageResponseDTO.prev}" class="page-item disabled">
                            <a class="page-link">&#60;</a>
                        </li>

                        <li th:each="num:${#numbers.sequence(pageResponseDTO.start, pageResponseDTO.end)}" class="page-item">
                            <a class="page-link" href="#">[[${num}]]</a></li>

                        <li th:if="${pageResponseDTO.next}" class="page-item">
                            <a class="page-link" href="#">&#62;</a>
                        </li>

                    </ul>
                </nav>

            </div>

        </div>

        <div class="text-end mb-4">
            <a th:href="@{/article/write(cate=${cate})}" class="btn btn-primary">글쓰기</a>
        </div>
        <!-- 내용 끝 -->
    </div>
</html>
